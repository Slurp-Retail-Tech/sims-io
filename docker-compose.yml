services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      APP_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: mysql://sims:tZf.QdVIa4R=nz}BWUjBaRSRyDH7LU%%@mysql:3306/sims-dev
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: jZT75?W;xXa[pK(nsw3Gw=eGy6<6P;TR
      MINIO_BUCKET: sims-dev
      MINIO_REGION: us-east-1
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
  mysql:
    image: mysql:8.4
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: RTj,GeM^PC-e@ZqbZPltE|f4&!EmbfyN
      MYSQL_DATABASE: sims-dev
      MYSQL_USER: sims
      MYSQL_PASSWORD: tZf.QdVIa4R=nz}BWUjBaRSRyDH7LU%
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "sims", "-ptZf.QdVIa4R=nz}BWUjBaRSRyDH7LU%"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: RTj,GeM^PC-e@ZqbZPltE|f4&!EmbfyN
    depends_on:
      mysql:
        condition: service_healthy
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    ports:
      - "9002:9000"
      - "9003:9003"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: jZT75?W;xXa[pK(nsw3Gw=eGy6<6P;TR
    command: server /data --console-address ":9003"
    volumes:
      - minio_data:/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  minio_data:
  redis_data:
