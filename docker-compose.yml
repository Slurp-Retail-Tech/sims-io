services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: mysql://sims:sims-password@mysql:3306/sims-local
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: sims-local
      MINIO_REGION: us-east-1
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sims-local
      MYSQL_USER: sims
      MYSQL_PASSWORD: sims-password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "sims", "-psims-password"]
      interval: 10s
      timeout: 5s
      retries: 5
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: sims
      PMA_PASSWORD: sims-password
    depends_on:
      mysql:
        condition: service_healthy
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    ports:
      - "9002:9000"
      - "9003:9003"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9003"
    volumes:
      - minio_data:/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  minio_data:
  redis_data:
