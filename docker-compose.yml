services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_CLICKUP_ENABLED: ${NEXT_PUBLIC_CLICKUP_ENABLED:-true}
        NEXT_PUBLIC_SUPPORT_PHONE: ${NEXT_PUBLIC_SUPPORT_PHONE:-}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-}
        NEXT_PUBLIC_SUPPORT_CONTACT: ${NEXT_PUBLIC_SUPPORT_CONTACT:-}
        NEXT_PUBLIC_SUPPORT_WHATSAPP: ${NEXT_PUBLIC_SUPPORT_WHATSAPP:-}
        NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN:-}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9002}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-sims}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      POS_API_EMAIL: ${POS_API_EMAIL:-}
      POS_API_PASSWORD: ${POS_API_PASSWORD:-}
      POS_AUTH_URL: ${POS_AUTH_URL:-https://api.getslurp.com/api/login}
      POS_IMPORT_URL: ${POS_IMPORT_URL:-https://api.getslurp.com/api/franchise-retrieve/}
      POS_API_BASE_URL: ${POS_API_BASE_URL:-}
      POS_BRANCH_URL: ${POS_BRANCH_URL:-}
      POS_MERCHANT_ID_BASE_URL: ${POS_MERCHANT_ID_BASE_URL:-}
      POS_CATEGORY_BUSINESS_BASE_URL: ${POS_CATEGORY_BUSINESS_BASE_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_WORKSPACE_DOMAINS: ${GOOGLE_WORKSPACE_DOMAINS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SIMS}
      CLICKUP_SYNC_CRON_SECRET: ${CLICKUP_SYNC_CRON_SECRET:-}
      CLICKUP_API_TOKEN: ${CLICKUP_API_TOKEN:-}
      CLICKUP_LIST_ID: ${CLICKUP_LIST_ID:-}
      CLICKUP_API_BASE_URL: ${CLICKUP_API_BASE_URL:-https://api.clickup.com/api/v2}
      CLICKUP_CUSTOM_FIELD_PRODUCT_ID: ${CLICKUP_CUSTOM_FIELD_PRODUCT_ID:-}
      CLICKUP_CUSTOM_FIELD_DEPARTMENT_REQUEST_ID: ${CLICKUP_CUSTOM_FIELD_DEPARTMENT_REQUEST_ID:-}
      CLICKUP_CUSTOM_FIELD_PRIORITY_LEVEL_ID: ${CLICKUP_CUSTOM_FIELD_PRIORITY_LEVEL_ID:-}
      CLICKUP_CUSTOM_FIELD_SEVERITY_LEVEL_ID: ${CLICKUP_CUSTOM_FIELD_SEVERITY_LEVEL_ID:-}
      NEXT_PUBLIC_CLICKUP_ENABLED: ${NEXT_PUBLIC_CLICKUP_ENABLED:-true}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      HUBSPOT_BUSINESS_TYPE_PROPERTY: ${HUBSPOT_BUSINESS_TYPE_PROPERTY:-}
      HUBSPOT_BUSINESS_LOCATION_PROPERTY: ${HUBSPOT_BUSINESS_LOCATION_PROPERTY:-}
      HUBSPOT_SOURCE_PROPERTY: ${HUBSPOT_SOURCE_PROPERTY:-}
      NEXT_PUBLIC_SUPPORT_PHONE: ${NEXT_PUBLIC_SUPPORT_PHONE:-}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-}
      NEXT_PUBLIC_SUPPORT_CONTACT: ${NEXT_PUBLIC_SUPPORT_CONTACT:-}
      NEXT_PUBLIC_SUPPORT_WHATSAPP: ${NEXT_PUBLIC_SUPPORT_WHATSAPP:-}
      SUPPORTFORM_WHATSAPP_NUMBER: ${SUPPORTFORM_WHATSAPP_NUMBER:-}
      DEMOFORM_WHATSAPP_NUMBER: ${DEMOFORM_WHATSAPP_NUMBER:-}
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN:-}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      MERCHANT_IMPORT_USER_ID: ${MERCHANT_IMPORT_USER_ID:-}
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
  db-migrate:
    image: mysql:8.4
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-sims}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/workspace:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "Waiting for MySQL at $${MYSQL_HOST}:$${MYSQL_PORT}..."
        until mysqladmin ping \
          -h"$${MYSQL_HOST}" \
          -P"$${MYSQL_PORT}" \
          -u"$${MYSQL_USER}" \
          -p"$${MYSQL_PASSWORD}" \
          --silent; do
          sleep 2
        done

        echo "Applying schema.sql..."
        mysql \
          -h"$${MYSQL_HOST}" \
          -P"$${MYSQL_PORT}" \
          -u"$${MYSQL_USER}" \
          -p"$${MYSQL_PASSWORD}" \
          "$${MYSQL_DATABASE}" < /workspace/schema.sql

        if [ -d /workspace/migrations ]; then
          for file in /workspace/migrations/*.sql; do
            if [ -f "$${file}" ]; then
              echo "Applying migration $${file}..."
              mysql \
                -h"$${MYSQL_HOST}" \
                -P"$${MYSQL_PORT}" \
                -u"$${MYSQL_USER}" \
                -p"$${MYSQL_PASSWORD}" \
                "$${MYSQL_DATABASE}" < "$${file}"
            fi
          done
        fi

        echo "Schema apply completed."
    restart: "no"
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:-sims}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u \"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    profiles: [dev]
    ports:
      - "${PHPMYADMIN_HOST_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${PHPMYADMIN_USER:-root}
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    ports:
      - "${MINIO_API_HOST_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9003}:9003"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9003"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mysql_data:
  minio_data:
  redis_data:
